<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go5x - 每回合5子围棋</title>
<script src="wgo.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #f5f0e6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
h1 { margin-bottom: 8px; color: #333; }
#status { font-size: 20px; font-weight: bold; margin: 12px 0; padding: 8px 24px; border-radius: 6px; background: #fff; border: 2px solid #333; min-width: 260px; text-align: center; }
#status.thinking { background: #fff3cd; border-color: #ffc107; }
#status.error { background: #f8d7da; border-color: #dc3545; }
#status.result { background: #d4edda; border-color: #28a745; font-size: 22px; }
#board { cursor: pointer; }
#board.disabled { pointer-events: none; opacity: 0.7; }
#controls { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
button { padding: 8px 20px; font-size: 16px; cursor: pointer; border: 1px solid #999; border-radius: 4px; background: #fff; }
button:hover { background: #eee; }
button:disabled { opacity: 0.4; cursor: default; }
button:disabled:hover { background: #fff; }
#move-log { margin-top: 16px; max-width: 600px; font-size: 13px; color: #666; max-height: 120px; overflow-y: auto; }
</style>
</head>
<body>
<h1>Go5x</h1>
<div id="status">请落子: 0 / 5</div>
<div id="board"></div>
<div id="controls">
  <button id="btn-end-turn" onclick="endTurnEarly()" disabled>提前结束本轮</button>
  <button id="btn-undo" onclick="undoLast()">撤回上一子</button>
  <button id="btn-score" onclick="endAndScore()">结束并计分</button>
  <button onclick="resetGame()">重新开始</button>
</div>
<div id="move-log"></div>

<script>
const STONES_PER_TURN = 5;
const BOARD_SIZE = 9;
const API = location.origin;

let board, currentMoves = [], gameActive = true, myTurn = true, turnNumber = 0;
let placing = false;
let lastBlackMoves = [];
let lastWhiteMoves = [];

async function init() {
  document.getElementById('board').innerHTML = '';
  board = new WGo.Board(document.getElementById('board'), {
    size: BOARD_SIZE,
    width: Math.min(560, window.innerWidth - 40)
  });
  board.addEventListener('click', onBoardClick);
  currentMoves = [];
  lastBlackMoves = [];
  lastWhiteMoves = [];
  gameActive = true;
  myTurn = false;
  turnNumber = 0;
  placing = false;
  updateButtons();
  updateStatus();
  try { await fetch(`${API}/reset`, { method: 'POST' }); } catch(e) {}
  requestAiTurn();
}

function onBoardClick(x, y) {
  if (!gameActive || !myTurn || placing) return;
  if (x < 0 || x >= BOARD_SIZE || y < 0 || y >= BOARD_SIZE) return;
  if (currentMoves.some(m => m.x === x && m.y === y)) return;
  if (board.obj_arr[x][y].some(o => o.c === WGo.B || o.c === WGo.W)) return;
  handlePlace(x, y);
}

async function handlePlace(x, y) {
  placing = true;
  updateButtons();

  if (currentMoves.length === 0) {
    clearOrderLabels();
  }

  try {
    const resp = await fetch(`${API}/place`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ x, y })
    });
    const data = await resp.json();

    if (data.error) {
      updateStatus('非法落子，请换一个位置', 'error');
      if (data.board) syncBoard(data.board);
      reapplyBlackLabels();
      setTimeout(() => { if (myTurn) updateStatus(); }, 1500);
      placing = false;
      updateButtons();
      return;
    }

    syncBoard(data.board);
    currentMoves.push({ x, y });
    reapplyBlackLabels();
    updateStatus();

    if (currentMoves.length === STONES_PER_TURN) {
      placing = false;
      updateButtons();
      await requestAiTurn();
      return;
    }
  } catch (e) {
    updateStatus('连接失败，请确认后端已启动', 'error');
    console.error(e);
  }
  placing = false;
  updateButtons();
}

async function endTurnEarly() {
  if (!myTurn || currentMoves.length === 0 || placing || !gameActive) return;
  await requestAiTurn();
}

async function endAndScore() {
  if (!gameActive || placing) return;
  gameActive = false;
  myTurn = false;
  document.getElementById('board').classList.add('disabled');
  updateStatus('计分中...', 'thinking');
  updateButtons();

  try {
    const resp = await fetch(`${API}/score`, { method: 'POST' });
    const data = await resp.json();

    if (data.error) {
      updateStatus('计分失败: ' + data.error, 'error');
      gameActive = true;
      myTurn = true;
      document.getElementById('board').classList.remove('disabled');
      updateButtons();
      return;
    }

    if (data.board) syncBoard(data.board);
    clearOrderLabels();

    const score = data.score;
    let msg;
    if (score.startsWith('B+')) {
      msg = `黑胜 ${score.slice(2)} 目`;
    } else if (score.startsWith('W+')) {
      msg = `白胜 ${score.slice(2)} 目`;
    } else {
      msg = score;
    }
    updateStatus(`终局: ${msg}`, 'result');
    logMessage(`--- 终局: ${msg} ---`);
  } catch (e) {
    updateStatus('连接失败', 'error');
    gameActive = true;
    myTurn = true;
    document.getElementById('board').classList.remove('disabled');
    console.error(e);
  }
  updateButtons();
}

function undoLast() {
  if (!myTurn || currentMoves.length === 0 || placing) return;
  placing = true;
  updateButtons();
  const last = currentMoves.pop();
  fetch(`${API}/undo`, { method: 'POST' })
    .then(r => r.json())
    .then(data => {
      if (data.board) syncBoard(data.board);
      else board.removeObjectsAt(last.x, last.y);
      reapplyBlackLabels();
      if (currentMoves.length === 0) reapplyWhiteLabels();
      updateStatus();
    })
    .catch(() => {
      board.removeObjectsAt(last.x, last.y);
      reapplyBlackLabels();
      if (currentMoves.length === 0) reapplyWhiteLabels();
      updateStatus();
    })
    .finally(() => { placing = false; updateButtons(); });
}

function updateButtons() {
  const canEndTurn = gameActive && myTurn && currentMoves.length > 0 && !placing;
  document.getElementById('btn-end-turn').disabled = !canEndTurn;
  document.getElementById('btn-undo').disabled = !(myTurn && currentMoves.length > 0 && !placing);
  document.getElementById('btn-score').disabled = !gameActive || placing;
}

function updateStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = type || '';
  if (msg) {
    el.textContent = msg;
  } else {
    el.textContent = myTurn
      ? `请落子: ${currentMoves.length} / ${STONES_PER_TURN}`
      : 'AI 思考中...';
  }
}

async function requestAiTurn() {
  lastBlackMoves = currentMoves.slice();
  const blackCoords = currentMoves.map(m => [m.x, m.y]);
  currentMoves = [];
  myTurn = false;
  document.getElementById('board').classList.add('disabled');
  updateStatus('AI 思考中...', 'thinking');
  updateButtons();
  turnNumber++;

  try {
    const resp = await fetch(`${API}/ai_turn`, { method: 'POST' });
    const data = await resp.json();

    if (data.error) {
      updateStatus('AI 错误: ' + data.error, 'error');
      if (data.board) syncBoard(data.board);
      myTurn = true;
      document.getElementById('board').classList.remove('disabled');
      updateButtons();
      return;
    }

    lastWhiteMoves = data.ai_moves.map(([x,y]) => ({x, y}));

    await animateAiMoves(data.ai_moves, data.board);

    logMoves(turnNumber, blackCoords, data.ai_moves);
    myTurn = true;
    document.getElementById('board').classList.remove('disabled');
    updateStatus();
    updateButtons();
  } catch (e) {
    updateStatus('连接失败', 'error');
    console.error(e);
    myTurn = true;
    document.getElementById('board').classList.remove('disabled');
    updateButtons();
  }
}

async function animateAiMoves(aiMoves, finalBoard) {
  clearOrderLabels();

  for (let i = 0; i < aiMoves.length; i++) {
    const [x, y] = aiMoves[i];
    await sleep(500);
    board.addObject({ x, y, c: WGo.W });
    board.addObject({ x, y, type: "LB", text: String(i + 1) });
    updateStatus(`AI 落子: ${i + 1} / ${aiMoves.length}`, 'thinking');
  }

  await sleep(600);

  syncBoard(finalBoard);
  reapplyWhiteLabels();
}

// --- Order label helpers ---

function clearOrderLabels() {
  for (const m of lastWhiteMoves) {
    removeLabelAt(m.x, m.y);
  }
  for (const m of lastBlackMoves) {
    removeLabelAt(m.x, m.y);
  }
  for (const m of currentMoves) {
    removeLabelAt(m.x, m.y);
  }
}

function removeLabelAt(x, y) {
  const objs = board.obj_arr[x][y];
  for (let i = objs.length - 1; i >= 0; i--) {
    if (objs[i].type === "LB") {
      board.removeObject(objs[i]);
    }
  }
}

function reapplyBlackLabels() {
  for (let i = 0; i < currentMoves.length; i++) {
    const m = currentMoves[i];
    removeLabelAt(m.x, m.y);
    board.addObject({ x: m.x, y: m.y, type: "LB", text: String(i + 1) });
  }
}

function reapplyWhiteLabels() {
  for (let i = 0; i < lastWhiteMoves.length; i++) {
    const m = lastWhiteMoves[i];
    removeLabelAt(m.x, m.y);
    board.addObject({ x: m.x, y: m.y, type: "LB", text: String(i + 1) });
  }
}

function syncBoard(state) {
  board.removeAllObjects();
  for (const [x, y] of state.black) {
    board.addObject({ x, y, c: WGo.B });
  }
  for (const [x, y] of state.white) {
    board.addObject({ x, y, c: WGo.W });
  }
}

function logMoves(turn, black, white) {
  const el = document.getElementById('move-log');
  const fmt = coords => coords.map(([x,y]) => `(${x},${y})`).join(' ');
  const bStr = black.length ? fmt(black) : '(无)';
  el.innerHTML = `<div>第${turn}回合 黑: ${bStr} | 白: ${fmt(white)}</div>` + el.innerHTML;
}

function logMessage(msg) {
  const el = document.getElementById('move-log');
  el.innerHTML = `<div><b>${msg}</b></div>` + el.innerHTML;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function resetGame() {
  try { await fetch(`${API}/reset`, { method: 'POST' }); } catch(e) {}
  document.getElementById('move-log').innerHTML = '';
  init();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
